*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding-bottom:90px}
button,input,select,textarea{font:inherit;font-size:16px;border:none;background:none;color:inherit}

.hdr{position:sticky;top:0;z-index:100;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px}
.logo em{font-style:normal;width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(255,255,255,0.05)}
.sync-status.online{color:#10b981}
.sync-status.offline{color:#f59e0b}
.sync-status.syncing{color:#6366f1}
.sync-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.sync-status.syncing .sync-dot{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.hdr-search{position:relative}
.hdr-search input{width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);font-size:14px}
.hdr-search:before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}

.bread{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px;color:#64748b;overflow-x:auto;white-space:nowrap}
.bread span{cursor:pointer;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.05)}
.bread span:hover{background:rgba(255,255,255,0.1)}
.bread span.current{color:#a5b4fc;background:rgba(99,102,241,0.2)}
.bread i{font-style:normal;color:#475569}

.navbar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));background:rgba(15,23,42,0.98);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.1)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;min-width:60px}
.nav-item:active{transform:scale(0.95)}
.nav-item.active{background:rgba(99,102,241,0.2)}
.nav-item .icon{font-size:22px}
.nav-item .label{font-size:10px;color:#64748b}
.nav-item.active .label{color:#a5b4fc}

.cnt{padding:16px;padding-bottom:20px}
.stats{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.stat{flex-shrink:0;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 14px;text-align:center;min-width:70px}
.stat strong{display:block;font-size:18px;color:#a5b4fc}
.stat small{font-size:9px;color:#64748b;text-transform:uppercase}

.alerts{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.alert-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer}
.alert-chip.red{background:rgba(239,68,68,0.2);color:#fca5a5}
.alert-chip.orange{background:rgba(245,158,11,0.2);color:#fcd34d}
.alert-chip.pink{background:rgba(236,72,153,0.2);color:#f9a8d4}
.alert-chip.blue{background:rgba(59,130,246,0.2);color:#93c5fd}

.stit{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;margin:16px 0 10px;letter-spacing:0.5px;display:flex;justify-content:space-between;align-items:center}
.stit button{font-size:11px;color:#6366f1;background:none;cursor:pointer}

.card{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.card.urgent{border-left:3px solid #ef4444}
.card-icon{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border-radius:10px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-info h3{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info p{font-size:11px;color:#64748b}
.card-actions{display:flex;gap:4px}
.card-act{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;background:rgba(255,255,255,0.05)}
.card-act:active{background:rgba(255,255,255,0.1)}
.card-act.edit{color:#6366f1}
.card-act.del{color:#ef4444}
.card-act.view{color:#10b981}

.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600}
.fab{position:fixed;bottom:max(80px,calc(env(safe-area-inset-bottom)+72px));right:16px;width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:14px;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4);z-index:90;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(0.95)}

.page-title{font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:12px;color:#64748b;margin-bottom:16px}
.box{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
.row:last-child{border:none}
.row span:first-child{color:#64748b}

.acts{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.abtn{flex-shrink:0;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.05);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.abtn:active{background:rgba(255,255,255,0.1)}
.abtn.p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.abtn.d{background:rgba(239,68,68,0.15);color:#ef4444}

.tabs{display:flex;gap:4px;margin-bottom:12px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;font-size:12px;color:#94a3b8;cursor:pointer}
.tab.on{background:rgba(99,102,241,0.3);color:#fff}

.rub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.rub-card{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;cursor:pointer;position:relative}
.rub-card:active{background:rgba(255,255,255,0.08)}
.rub-card .icon{font-size:28px;margin-bottom:6px}
.rub-card h4{font-size:13px;font-weight:600;margin-bottom:2px}
.rub-card p{font-size:11px;color:#64748b}
.rub-card .count{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:10px;font-size:11px}
.rub-card.urgent{border:1px solid rgba(239,68,68,0.3)}

.photo-main{width:100%;aspect-ratio:4/3;border-radius:12px;overflow:hidden;margin-bottom:10px;background:#1e293b;cursor:pointer}
.photo-main img{width:100%;height:100%;object-fit:cover}
.photo-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
.photo-thumb{width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid transparent}
.photo-thumb.active{border-color:#6366f1}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-add{background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;color:#64748b}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:4px 10px;border-radius:12px;font-size:11px;background:rgba(255,255,255,0.1)}
.chip.purple{background:rgba(99,102,241,0.2);color:#a5b4fc}
.chip.pink{background:rgba(236,72,153,0.2);color:#f9a8d4}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.mpan{background:#1e293b;border-radius:20px 20px 0 0;padding:20px;padding-bottom:max(20px,calc(env(safe-area-inset-bottom)+12px));width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.mbar{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.mtit{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px}

.form-section{margin-bottom:16px}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:11px;color:#94a3b8;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);font-size:14px}
.fld textarea{min-height:60px;resize:none}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;padding:12px;border-radius:10px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:center;font-size:14px}
.btn.p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn.s{background:rgba(255,255,255,0.05);color:#94a3b8}
.btn.d{background:rgba(239,68,68,0.15);color:#ef4444}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.toggle-more{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;color:#6366f1;font-size:12px;cursor:pointer;margin-bottom:12px}
.hidden{display:none}

.drop{border:2px dashed rgba(99,102,241,0.3);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;background:rgba(99,102,241,0.05)}
.drop .icon{font-size:24px;margin-bottom:4px}
.drop p{font-size:12px;color:#64748b}

.viewer{position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:250;display:flex;flex-direction:column}
.viewer-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
.viewer-hdr button{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.viewer-body{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.viewer-body img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:80px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);color:#fff;font-size:20px;cursor:pointer;border:none}
.viewer-nav.l{left:0;border-radius:0 8px 8px 0}
.viewer-nav.r{right:0;border-radius:8px 0 0 8px}
.viewer-ftr{padding:12px;text-align:center;color:#94a3b8;font-size:13px}

.menu{position:fixed;inset:0;z-index:150}
.menu-bg{position:absolute;inset:0;background:rgba(0,0,0,0.6)}
.menu-panel{position:absolute;top:0;right:0;bottom:0;width:280px;background:#1e293b;padding:20px;padding-top:max(20px,env(safe-area-inset-top));overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;margin-bottom:4px;cursor:pointer;font-size:14px}
.menu-item:active{background:rgba(255,255,255,0.05)}

.empty{text-align:center;padding:40px 20px;color:#64748b}
.empty .icon{font-size:40px;margin-bottom:8px;opacity:0.5}

.dep-item{background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.dep-item h4{font-size:13px;font-weight:600}
.dep-item p{font-size:11px;color:#64748b}
.dep-item strong{font-size:16px;color:#10b981}

.total-box{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.15));border-radius:12px;padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.total-box span{color:#a5b4fc;font-size:12px}
.total-box strong{font-size:20px}

/* Login Screen */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.login-logo{font-size:64px;margin-bottom:16px}
.login-title{font-size:28px;font-weight:700;margin-bottom:8px}
.login-sub{font-size:14px;color:#64748b;margin-bottom:32px}
.login-box{background:rgba(255,255,255,0.05);border-radius:16px;padding:24px;width:100%;max-width:340px}
.login-tabs{display:flex;margin-bottom:20px;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px}
.login-tab{flex:1;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;color:#94a3b8}
.login-tab.on{background:#6366f1;color:#fff}
.code-input{font-size:24px;letter-spacing:8px;text-align:center;text-transform:uppercase;font-weight:700}
.code-display{background:rgba(99,102,241,0.2);border:2px solid #6366f1;border-radius:12px;padding:16px;margin:16px 0;font-size:28px;letter-spacing:6px;font-weight:700;color:#a5b4fc}
.team-info{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;margin-top:16px;font-size:12px;color:#64748b}

/* Loader */
.loader{display:flex;align-items:center;justify-content:center;padding:40px}
.loader-spin{width:32px;height:32px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Upload progress */
.upload-progress{background:rgba(99,102,241,0.2);border-radius:8px;padding:12px;margin:12px 0}
.upload-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-top:8px}
.upload-fill{height:100%;background:#6366f1;border-radius:2px;transition:width 0.3s}

@media print{.hdr,.navbar,.fab,.modal,.viewer,.menu{display:none!important}body{background:#fff!important;color:#000!important;padding:10px}}

/* Calendar strip */
.cal-strip{margin-bottom:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-header span{font-size:13px;font-weight:600;color:#a5b4fc}
.cal-header button{background:none;border:none;color:#64748b;font-size:18px;cursor:pointer;padding:4px 8px}
.cal-days{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.cal-day{flex-shrink:0;width:46px;padding:6px 3px;border-radius:10px;background:rgba(255,255,255,0.04);text-align:center;cursor:pointer;position:relative;transition:all 0.2s;scroll-snap-align:start}
.cal-day:active{transform:scale(0.96)}
.cal-day.today{background:rgba(99,102,241,0.25);border:1px solid rgba(99,102,241,0.4)}
.cal-day.selected{background:rgba(99,102,241,0.35);border:1px solid #6366f1}
.cal-day.sunday{opacity:0.5}
.cal-day .day-month{font-size:8px;color:#a5b4fc;text-transform:uppercase;font-weight:700;margin-bottom:1px}
.cal-day .day-name{font-size:9px;color:#64748b;text-transform:uppercase;margin-bottom:1px}
.cal-day.today .day-name{color:#a5b4fc}
.cal-day .day-num{font-size:15px;font-weight:700}
.cal-day.today .day-num{color:#a5b4fc}
.cal-bar{height:3px;border-radius:2px;margin:2px 2px 0}
.cal-bar.prepa{background:#f59e0b}
.cal-bar.shoot{background:#ec4899}
.cal-badges{display:flex;gap:2px;justify-content:center;margin-top:3px;min-height:6px;flex-wrap:wrap}
.cal-badge{width:6px;height:6px;border-radius:50%}
.cal-badge.red{background:#ef4444}
.cal-badge.orange{background:#f59e0b}
.cal-badge.pink{background:#ec4899}
.cal-badge.blue{background:#3b82f6}
.cal-detail{margin-top:8px}
.cal-detail-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.05);margin-bottom:4px;font-size:12px;cursor:pointer}
.cal-detail-item:active{background:rgba(255,255,255,0.08)}
.cal-strip.compact{margin-bottom:0}
.cal-strip.compact .cal-header{margin-bottom:4px}
.cal-strip.compact .cal-header span{font-size:11px}
.cal-strip.compact .cal-day{width:42px;padding:4px 2px}
.cal-strip.compact .day-num{font-size:14px}
</style>
</head>

function gs(id){for(var i=0;i<STAT.length;i++)if(STAT[i].id===id)return STAT[i];return STAT[0]}
function gsd(id){for(var i=0;i<STATD.length;i++)if(STATD[i].id===id)return STATD[i];return STATD[0]}
function gr(id){for(var i=0;i<RUB.length;i++)if(RUB[i].id===id)return RUB[i];return null}
function gt(id){for(var i=0;i<TPROJ.length;i++)if(TPROJ[i].id===id)return TPROJ[i];return TPROJ[0]}
function gl(id){for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].id===id)return D.loueurs[i];return null}
function fd(d){return d?new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}):"-"}
function fm(n){return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(n||0)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function genCode(){var c="";var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";for(var i=0;i<6;i++)c+=chars[Math.floor(Math.random()*chars.length)];return c}
function money(v){var n=parseFloat(v);return isNaN(n)?0:n}
function isRentedElement(e){
  if(!e)return false;
  return !!(e.loueurId || e.coutLocation || e.coutReel || e.dateDepart || e.dateRetour || e.statut==="loue" || e.statut==="reserve" || e.statut==="livre" || e.statut==="restitue");
}
function getRentItems(){
  var items=[];
  for(var i=0;i<D.projets.length;i++){
    var p=D.projets[i]; if(!p.decors)continue;
    for(var j=0;j<p.decors.length;j++){
      var d=p.decors[j]; if(!d.elements)continue;
      for(var k=0;k<d.elements.length;k++){
        var e=d.elements[k];
        if(isRentedElement(e)) items.push({e:e,d:d,p:p,l: e.loueurId?gl(e.loueurId):null});
      }
    }
  }
  return items;
}
function setRentTab(v){RTL=v;R();}
function getDecorPortfolioGroups(){
  var groups=[];
  for(var i=0;i<RUB.length;i++){
    var r=RUB[i], arr=[];
    if(DC&&DC.elements) for(var j=0;j<DC.elements.length;j++){
      var e=DC.elements[j];
      if(e.rubrique===r.id && e.photos && e.photos.length){
        for(var k=0;k<e.photos.length;k++) arr.push({data:e.photos[k],nom:e.nom,rubrique:r.n});
      }
    }
    if(arr.length) groups.push({rubrique:r, photos:arr});
  }
  return groups;
}

// Firebase sync
function subscribeToProject(code){
  if(!HAS_FIREBASE){
    SYNCING=false;
    D = loadLocalData();
    CODE = code || "LOCAL";
    R();
    return;
  }
  if(UNSUB)UNSUB();
  SYNCING=true;R();
  
  UNSUB = db.collection("projects").doc(code).onSnapshot(function(doc){
    SYNCING=false;
    if(doc.exists){
      var data = doc.data();
      D.projets = data.projets || [];
      D.loueurs = data.loueurs || [];
      D.depenses = data.depenses || [];
      if(P){var pid=P.id;P=null;for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===pid){P=D.projets[i];break}}
      if(DC&&P&&P.decors){var did=DC.id;DC=null;for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===did){DC=P.decors[i];break}}
      if(EL&&DC&&DC.elements){var eid=EL.id;EL=null;for(var i=0;i<DC.elements.length;i++)if(DC.elements[i].id===eid){EL=DC.elements[i];break}}
      R();
    }
  }, function(err){
    console.error("Firestore error:", err);
    SYNCING=false;R();
  });
}

function saveToFirebase(){
  if(!HAS_FIREBASE){ saveLocalData(D); SYNCING=false; return; }
  if(!CODE)return;
  SYNCING=true;R();
  db.collection("projects").doc(CODE).set({
    projets: D.projets,
    loueurs: D.loueurs,
    depenses: D.depenses,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    SYNCING=false;R();
  }).catch(function(err){
    console.error("Save error:", err);
    SYNCING=false;R();
  });
}

function sv(){saveToFirebase();}

// Photo upload to Firebase Storage
function uploadPhoto(file, callback){
  if(!HAS_FIREBASE || !CODE){ fileToDataUrl(file, callback); return; }
  var path = "projects/"+CODE+"/photos/"+uid()+"_"+file.name;
  var ref = storage.ref(path);
  var task = ref.put(file);
  task.on("state_changed", 
    function(snapshot){
      var pct = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
      if(window.updateUploadProgress)window.updateUploadProgress(pct);
    },
    function(err){console.error("Upload error:",err);callback(null);},
    function(){ task.snapshot.ref.getDownloadURL().then(function(url){ callback(url); }); }
  );
}

function getAlerts(){
  var today=new Date();today.setHours(0,0,0,0);
  var tomorrow=new Date(today);tomorrow.setDate(tomorrow.getDate()+1);
  var a={urgents:[],retards:[],nonPrets:[],aujourdhui:[],demain:[]};
  for(var i=0;i<D.projets.length;i++){var p=D.projets[i];if(!p.decors)continue;
    for(var j=0;j<p.decors.length;j++){var d=p.decors[j];if(!d.elements)continue;
      for(var k=0;k<d.elements.length;k++){var e=d.elements[k];
        if(e.urgent)a.urgents.push({e:e,d:d,p:p});
        if(e.dateJeu){var dj=new Date(e.dateJeu);dj.setHours(0,0,0,0);
          if(dj.getTime()===today.getTime())a.aujourdhui.push({e:e,d:d,p:p});
          else if(dj.getTime()===tomorrow.getTime())a.demain.push({e:e,d:d,p:p});
          if(dj<=tomorrow&&e.statut!=="installe"&&e.statut!=="livre")a.nonPrets.push({e:e,d:d,p:p});}
        if(e.dateRetour){var dr=new Date(e.dateRetour);dr.setHours(0,0,0,0);
          if(dr<today&&e.statut!=="restitue")a.retards.push({e:e,d:d,p:p});}}}}
  return a;
}

function search(q){
  if(!q||q.length<2)return[];q=q.toLowerCase();var r=[];
  for(var i=0;i<D.projets.length;i++){var p=D.projets[i];
    if(p.nom.toLowerCase().indexOf(q)>=0)r.push({t:"projet",item:p});
    if(p.decors)for(var j=0;j<p.decors.length;j++){var d=p.decors[j];
      if(d.nom.toLowerCase().indexOf(q)>=0)r.push({t:"decor",item:d,p:p});
      if(d.elements)for(var k=0;k<d.elements.length;k++){var e=d.elements[k];
        if(e.nom.toLowerCase().indexOf(q)>=0||(e.tags&&e.tags.toLowerCase().indexOf(q)>=0))r.push({t:"element",item:e,d:d,p:p});}}}
  for(var i=0;i<D.loueurs.length;i++)if(D.loueurs[i].nom.toLowerCase().indexOf(q)>=0)r.push({t:"loueur",item:D.loueurs[i]});
  return r.slice(0,15);
}

// Login/Join
window.joinProject=function(){
  if(!HAS_FIREBASE){ alert("Le mode rejoindre n'est disponible qu'avec Firebase configuré. Utilisez le mode local."); return; }
  var code = document.getElementById("join-code").value.toUpperCase().trim();
  if(code.length!==6)return alert("Le code doit contenir 6 caractères");
  db.collection("projects").doc(code).get().then(function(doc){
    if(doc.exists){ CODE=code; localStorage.setItem("dp_code",CODE); subscribeToProject(CODE); }
    else{ alert("Projet introuvable. Vérifiez le code."); }
  });
};

window.createProject=function(){
  if(!HAS_FIREBASE){
    CODE="LOCAL";
    localStorage.setItem("dp_code",CODE);
    D=loadLocalData();
    if(!D.projets)D={projets:[],loueurs:[],depenses:[]};
    V="home"; R();
    return;
  }
  var code = genCode();
  CODE=code;
  localStorage.setItem("dp_code",CODE);
  D={projets:[],loueurs:[],depenses:[]};
  db.collection("projects").doc(CODE).set({
    projets:[],loueurs:[],depenses:[],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){ subscribeToProject(CODE); });
};

window.exportData=function(){
  var data=JSON.stringify(D,null,2);
  var blob=new Blob([data],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="decor-pro-"+CODE+"-"+(new Date().toISOString().split("T")[0])+".json";
  a.click();
  URL.revokeObjectURL(url);
  MN=false;R();
};

window.importData=function(){
  var input=document.createElement("input");
  input.type="file";
  input.accept=".json";
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var imported=JSON.parse(ev.target.result);
        if(!imported.projets&&!imported.loueurs&&!imported.depenses){alert("Fichier invalide");return;}
        if(!confirm("Importer ces données ? Cela remplacera les données actuelles."))return;
        if(imported.projets)D.projets=imported.projets;
        if(imported.loueurs)D.loueurs=imported.loueurs;
        if(imported.depenses)D.depenses=imported.depenses;
        sv();
        MN=false;
        R();
        alert("Données importées !");
      }catch(err){alert("Erreur: fichier JSON invalide");}
    };
    reader.readAsText(file);
  };
  input.click();
};

window.leaveProject=function(){
  if(!confirm("Quitter ce projet ?"))return;
  if(UNSUB)UNSUB();
  CODE=null;
  localStorage.removeItem("dp_code");
  if(!HAS_FIREBASE) saveLocalData(D);
  D={projets:[],loueurs:[],depenses:[]};
  MN=false;
  R();
};

window.calSel=function(ds){
  CALSEL=ds;
  // Naviguer vers le décor prévu ce jour
  var alerts=getAlertsForDate(new Date(ds));
  if(alerts.shoot.length){
    var x=alerts.shoot[0];
    for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===x.p.id){P=D.projets[i];break}
    if(P&&P.decors)for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===x.d.id){DC=P.decors[i];break}
    if(DC){V="dec";TB="rub";R();return;}
  }
  if(alerts.prepa.length){
    var x=alerts.prepa[0];
    for(var i=0;i<D.projets.length;i++)if(D.projets[i].id===x.p.id){P=D.projets[i];break}
    if(P&&P.decors)for(var i=0;i<P.decors.length;i++)if(P.decors[i].id===x.d.id){DC=P.decors[i];break}
    if(DC){V="dec";TB="rub";R();return;}
  }
  R();
};
window.calNav=function(d){CALOFF+=d;R();};

function rCalendarStrip(){
  var today=new Date();today.setHours(0,0,0,0);
  var start=new Date(today);
  start.setDate(start.getDate()-7+(CALOFF*7));
  var JOURS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  var MOIS=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  var NB_DAYS=28;
  
  var h='<div class="cal-strip compact">';
  h+='<div class="cal-header"><button onclick="calNav(-1)">◀</button>';
  h+='<span>📅 '+MOIS[today.getMonth()]+' '+today.getFullYear()+'</span>';
  h+='<button onclick="calNav(1)">▶</button></div>';
  h+='<div class="cal-days">';
  
  for(var i=0;i<NB_DAYS;i++){
    var d=new Date(start);d.setDate(start.getDate()+i);
    var ds=d.toISOString().split("T")[0];
    var isToday=d.getTime()===today.getTime();
    var isSel=CALSEL===ds;
    var isSun=d.getDay()===0;
    var isNewMonth=(i===0||d.getDate()===1);
    var alerts=getAlertsForDate(d);
    
    h+='<div class="cal-day'+(isToday?' today':'')+(isSel?' selected':'')+(isSun?' sunday':'')+'" onclick="calSel(\''+ds+'\')">';
    if(isNewMonth)h+='<div class="day-month">'+MOIS[d.getMonth()]+'</div>';
    h+='<div class="day-name">'+JOURS[d.getDay()]+'</div>';
    h+='<div class="day-num">'+d.getDate()+'</div>';
    if(alerts.prepa.length)h+='<div class="cal-bar prepa"></div>';
    if(alerts.shoot.length)h+='<div class="cal-bar shoot"></div>';
    h+='<div class="cal-badges">';
    if(alerts.urgents.length)h+='<div class="cal-badge red"></div>';
    if(alerts.retards.length)h+='<div class="cal-badge orange"></div>';
    if(alerts.tournage.length)h+='<div class="cal-badge pink"></div>';
    if(alerts.departs.length)h+='<div class="cal-badge" style="background:#6366f1"></div>';
    if(alerts.retours.length)h+='<div class="cal-badge" style="background:#14b8a6"></div>';
    h+='</div></div>';
  }
  h+='</div></div>';
  return h;
}

function getAlertsForDate(date){
  var d0=new Date(date);d0.setHours(0,0,0,0);
  var items={urgents:[],retards:[],tournage:[],nonPrets:[],departs:[],retours:[],prepa:[],shoot:[]};
  for(var i=0;i<D.projets.length;i++){var p=D.projets[i];if(!p.decors)continue;
    for(var j=0;j<p.decors.length;j++){var dc=p.decors[j];
      // Dates décor : installation (prépa) et tournage
      if(dc.dateInstallation){var di=new Date(dc.dateInstallation);di.setHours(0,0,0,0);if(di.getTime()===d0.getTime())items.prepa.push({d:dc,p:p});}
      if(dc.dateTournage){var dt=new Date(dc.dateTournage);dt.setHours(0,0,0,0);if(dt.getTime()===d0.getTime())items.shoot.push({d:dc,p:p});}
      if(!dc.elements)continue;
      for(var k=0;k<dc.elements.length;k++){var e=dc.elements[k];
        if(e.dateJeu){var dj=new Date(e.dateJeu);dj.setHours(0,0,0,0);
          if(dj.getTime()===d0.getTime()){
            items.tournage.push({e:e,d:dc,p:p});
            if(e.statut!=="installe"&&e.statut!=="livre")items.nonPrets.push({e:e,d:dc,p:p});
          }
        }
        if(e.dateDepart){var dd=new Date(e.dateDepart);dd.setHours(0,0,0,0);
          if(dd.getTime()===d0.getTime())items.departs.push({e:e,d:dc,p:p});
        }
        if(e.dateRetour){var dr=new Date(e.dateRetour);dr.setHours(0,0,0,0);
          if(dr.getTime()===d0.getTime())items.retours.push({e:e,d:dc,p:p});
          if(dr.getTime()===d0.getTime()&&e.statut!=="restitue")items.retards.push({e:e,d:dc,p:p});
        }
        if(e.urgent){
          if(e.dateJeu){var dj2=new Date(e.dateJeu);dj2.setHours(0,0,0,0);if(dj2.getTime()===d0.getTime())items.urgents.push({e:e,d:dc,p:p});}
        }
      }}}
  return items;
}

function rCalendar(){

var PENDING_FILES=[];
window.prvPh=function(e){
  var files=e.target.files;PENDING_FILES=[];
  var pr=document.getElementById("phpr"),pl=document.getElementById("phpl");
  for(var i=0;i<files.length;i++)PENDING_FILES.push(files[i]);
  if(pr&&pl&&PENDING_FILES.length){pr.innerHTML='<div style="color:#a5b4fc;font-size:12px">'+PENDING_FILES.length+' photo(s) sélectionnée(s)</div>';pl.style.display="none";}
};

window.addPh=function(){
  var i=document.createElement("input");i.type="file";i.accept="image/*";i.multiple=true;
  i.onchange=function(e){
    var files=e.target.files;var uploaded=0;var total=files.length;
    for(var j=0;j<files.length;j++){
      uploadPhoto(files[j],function(url){
        if(url){if(!EL.photos)EL.photos=[];EL.photos.push(url);}
        uploaded++;if(uploaded===total){sv();R();}
      });
    }
  };i.click();
};
